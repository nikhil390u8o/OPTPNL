<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>{% block title %}TG Store{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
<style>
:root{--bg:#080b12;--surface:#0e1320;--border:#1a2235;--green:#00f5a0;--green2:#00d9f5;--red:#ff5555;--text:#e8eaf0;--muted:#5a6478;--card:#111827}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;max-width:480px;margin:0 auto}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,160,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,160,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* NAV */
nav{border-bottom:1px solid var(--border);padding:11px 14px;position:sticky;top:0;background:rgba(8,11,18,.97);backdrop-filter:blur(12px);z-index:100;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Space Mono',monospace;font-size:.82rem;color:var(--green);letter-spacing:2px;text-decoration:none}
.logo span{color:var(--text)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-bal{color:var(--green);font-weight:700;font-family:'Space Mono',monospace;font-size:.75rem}
.nav-link{color:var(--muted);text-decoration:none;font-size:.75rem;transition:color .2s}
.nav-link:hover{color:var(--green)}
.nav-link.logout{color:var(--red)}

/* LAYOUT */
.container{padding:0 14px;position:relative;z-index:1}
.page{padding:18px 0 80px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}

/* TYPOGRAPHY */
h1{font-size:1.35rem;font-weight:800;margin-bottom:4px}
h2{font-size:1.05rem;font-weight:700;margin-bottom:12px}
.label{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--green);letter-spacing:2px;margin-bottom:6px}
.muted{color:var(--muted);font-size:.78rem}

/* INPUTS */
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Space Mono',monospace;font-size:.78rem;outline:none;transition:border-color .2s;margin-bottom:10px}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
input::placeholder,textarea::placeholder{color:var(--muted)}

/* BUTTONS */
.btn{display:inline-block;padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;transition:opacity .2s,transform .15s;text-decoration:none;text-align:center}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green2));color:#000}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-red{background:rgba(255,85,85,.15);border:1px solid rgba(255,85,85,.3);color:var(--red)}
.btn-full{width:100%}

/* ALERTS */
.msg{font-size:.75rem;padding:9px 12px;border-radius:8px;margin-top:8px;display:none}
.msg.show{display:block}
.msg.error{background:rgba(255,85,85,.08);border:1px solid rgba(255,85,85,.2);color:var(--red)}
.msg.success{background:rgba(0,245,160,.08);border:1px solid rgba(0,245,160,.2);color:var(--green)}

/* BADGES */
.badge{display:inline-block;font-family:'Space Mono',monospace;font-size:.6rem;padding:3px 7px;border-radius:4px;font-weight:700}
.badge-green{background:rgba(0,245,160,.12);color:var(--green);border:1px solid rgba(0,245,160,.2)}
.badge-red{background:rgba(255,85,85,.12);color:var(--red);border:1px solid rgba(255,85,85,.2)}
.badge-blue{background:rgba(0,217,245,.12);color:var(--green2);border:1px solid rgba(0,217,245,.2)}

/* GRIDS */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.grid-3{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.grid-4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

/* MISC */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.mono{font-family:'Space Mono',monospace}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(8,11,18,.97);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 14px;z-index:100;backdrop-filter:blur(12px)}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--muted);font-size:.6rem;font-family:'Space Mono',monospace;transition:color .2s;cursor:pointer;border:none;background:none}
.bnav-item.active{color:var(--green)}
.bnav-item span{font-size:1.2rem}
</style>
{% block head %}{% endblock %}
</head>
<body>
{% if session.user_id %}
<nav>
  <a class="logo" href="/dashboard">TG<span>_STORE</span></a>
  <div class="nav-right">
    <span class="nav-bal" id="nav-bal">₹{{ "%.2f"|format(user[2]|float) if user else "0.00" }}</span>
    {% if session.is_admin %}<a class="nav-link" href="/admin">⚙️</a>{% endif %}
    <a class="nav-link logout" href="/logout">Exit</a>
  </div>
</nav>
{% endif %}

{% block body %}{% endblock %}

{% if session.user_id %}
<div class="bottom-nav">
  <a class="bnav-item {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">
    <span>🏠</span>Home
  </a>
  <a class="bnav-item {% if request.path == '/buy' %}active{% endif %}" href="/buy">
    <span>🛒</span>Buy
  </a>
  <a class="bnav-item" href="/dashboard" onclick="setTimeout(()=>openDeposit&&openDeposit(),100)">
    <span>💰</span>Deposit
  </a>
  <a class="bnav-item {% if request.path == '/logout' %}active{% endif %}" href="/logout">
    <span>🚪</span>Logout
  </a>
</div>
{% endif %}

<script>{% block script %}{% endblock %}</script>
</body>
</html>
