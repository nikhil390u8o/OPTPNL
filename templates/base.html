<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>{% block title %}TG Store{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
<style>
:root{--bg:#080b12;--surface:#0e1320;--border:#1a2235;--green:#00f5a0;--green2:#00d9f5;--red:#ff5555;--text:#e8eaf0;--muted:#5a6478;--card:#111827}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,160,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,160,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
nav{border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;background:rgba(8,11,18,.95);backdrop-filter:blur(12px);z-index:100;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Space Mono',monospace;font-size:.9rem;color:var(--green);letter-spacing:2px;text-decoration:none}
.logo span{color:var(--text)}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-user{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--muted)}
.nav-bal{color:var(--green);font-weight:700}
.nav-link{color:var(--muted);text-decoration:none;font-size:.8rem;transition:color .2s}
.nav-link:hover{color:var(--green)}
.nav-link.logout{color:var(--red)}
.container{max-width:960px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
.page{padding:40px 0}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
h1{font-size:1.8rem;font-weight:800;margin-bottom:6px}
h2{font-size:1.3rem;font-weight:700;margin-bottom:16px}
.label{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--green);letter-spacing:2px;margin-bottom:8px}
.muted{color:var(--muted);font-size:.85rem}
input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'Space Mono',monospace;font-size:.82rem;outline:none;transition:border-color .2s;margin-bottom:14px}
input:focus,select:focus{border-color:var(--green)}
input::placeholder{color:var(--muted)}
.btn{display:inline-block;padding:11px 24px;border-radius:8px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;transition:opacity .2s,transform .15s;text-decoration:none;text-align:center}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green2));color:#000}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--green);color:var(--green)}
.btn-red{background:rgba(255,85,85,.15);border:1px solid rgba(255,85,85,.3);color:var(--red)}
.btn-full{width:100%}
.msg{font-size:.8rem;padding:10px 14px;border-radius:8px;margin-top:10px;display:none}
.msg.show{display:block}
.msg.error{background:rgba(255,85,85,.08);border:1px solid rgba(255,85,85,.2);color:var(--red)}
.msg.success{background:rgba(0,245,160,.08);border:1px solid rgba(0,245,160,.2);color:var(--green)}
.badge{display:inline-block;font-family:'Space Mono',monospace;font-size:.65rem;padding:3px 8px;border-radius:4px;font-weight:700}
.badge-green{background:rgba(0,245,160,.12);color:var(--green);border:1px solid rgba(0,245,160,.2)}
.badge-red{background:rgba(255,85,85,.12);color:var(--red);border:1px solid rgba(255,85,85,.2)}
.badge-blue{background:rgba(0,217,245,.12);color:var(--green2);border:1px solid rgba(0,217,245,.2)}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.mono{font-family:'Space Mono',monospace}
@media(max-width:600px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.nav-user{display:none}}
</style>
{% block head %}{% endblock %}
</head>
<body>
{% if session.user_id %}
<nav>
  <a class="logo" href="/dashboard">TG<span>_STORE</span></a>
  <div class="nav-right">
    <span class="nav-user">@{{ session.username }} · <span class="nav-bal" id="nav-bal">₹{{ "%.2f"|format(user[2]|float) if user else "0.00" }}</span></span>
    {% if session.is_admin %}<a class="nav-link" href="/admin">Admin</a>{% endif %}
    <a class="nav-link" href="/buy">Buy</a>
    <a class="nav-link logout" href="/logout">Logout</a>
  </div>
</nav>
{% endif %}
{% block body %}{% endblock %}
<script>{% block script %}{% endblock %}</script>
</body>
</html>
